<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicio1</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 1rem;
        font-size: 1.5rem;
        font-family: sans-serif;
        background-color: rgb(45, 45, 112);
        height: 300vh;
      }
      div {
        background-color: gray;
      }
      .parent {
        width: 50%;
      }
      .static {
        background-color: #f5f5f5;
        height: 75px;
        margin-top: 2px;
        border-color: #000080;
      }
      .sticky {
        background-color: #ffe4c4;
        z-index: 100;
        height: 75px;
        padding: 30px;
      }
      .static {
        position: static;
        padding: 30px;
      }
      .sticky {
        position: sticky;
        top: 0px;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="sticky">Pegajoso</div>
      <div class="static">Estatico</div>
      <div class="static">Estatico</div>
      <div class="static">Estatico</div>
      <div class="static">Estatico</div>
    </div>
  </body>
</html>
